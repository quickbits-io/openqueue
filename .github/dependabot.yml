version: 2
updates:
  # Keep SHA-pinned GitHub Actions current (security patches for the actions).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # npm dependencies across the workspace.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
