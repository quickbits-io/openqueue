name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege. Fork PRs already run with a read-only token and no access to
# secrets; this makes that explicit for pushes too.
permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      # Actions are pinned to a commit SHA (supply-chain hardening); the trailing
      # comment tracks the human-readable version. Dependabot keeps them current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # CI never pushes — don't leave the token in the git config where build
          # code (incl. untrusted PR code) could read it.
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      # Bun does not run dependency lifecycle (postinstall) scripts unless a
      # package is in `trustedDependencies`, so a malicious dependency in a fork
      # PR can't auto-execute on install.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
