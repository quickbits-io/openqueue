name: Release

on:
  push:
    branches: [main]
  # Re-run a publish for an already-tagged release (e.g. after fixing a
  # release:check failure) without waiting for the next release PR.
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # release commits + tags + GitHub releases
  pull-requests: write # open/update the release PR

jobs:
  # Versions and changelogs derive from conventional commits on main
  # (fix → patch, feat → minor, feat!/BREAKING CHANGE → major; squash-merge
  # PR titles are the commits). No changeset files, no manual steps: merges
  # accumulate into a single lockstep release PR, and merging that PR
  # publishes.
  release-please:
    name: Release PR or tag
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance / future OIDC trusted publishing
    # NPM_TOKEN lives as an *environment* secret on "release" so it is
    # unreadable from other workflows/jobs; add required reviewers there for a
    # human approval gate before publish if wanted.
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      # No --frozen-lockfile: the release commit bumped package versions, and
      # bun publish rewrites workspace: deps from the versions recorded in
      # bun.lock — the refreshed local lockfile is what makes that correct.
      - name: Install dependencies
        run: bun install

      - name: Build and publish
        run: bun run release
        env:
          # bun publish reads the registry token from NPM_CONFIG_TOKEN; it does
          # not pick up a token written to ~/.npmrc when publishing per-package.
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
