name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # version-bump commit + tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm provenance / future OIDC trusted publishing

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    # Scope NPM_TOKEN to a protected environment. Store NPM_TOKEN as an
    # *environment* secret named "release" (Settings → Environments) so it is
    # unreadable from any other workflow/job, and optionally add required
    # reviewers there for a human approval gate before publish.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Opens/updates a "Version Packages" PR when changesets are present, and
      # publishes to npm (running `bun run release`) once that PR is merged.
      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
